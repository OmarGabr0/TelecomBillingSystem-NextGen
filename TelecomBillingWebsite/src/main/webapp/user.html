<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TelecoSmart - User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .topnav {
            background: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            border-bottom: 1px solid var(--border-color);
        }

        .topnav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary-color);
        }

        .topnav .nav-links a {
            margin-left: 20px;
            text-decoration: none;
            color: var(--text-main);
            font-weight: 500;
            cursor: pointer;
            transition: color 0.2s;
        }

        .topnav .nav-links a:hover {
            color: var(--primary-color);
        }

        .user-main {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .hero {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-hover));
            color: white;
            padding: 40px;
            border-radius: var(--radius-lg);
            margin-bottom: 30px;
            box-shadow: var(--shadow-md);
        }

        .hero h1 {
            margin-bottom: 10px;
            font-size: 2.5rem;
        }

        .hero p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        /* Mobile Responsiveness */
        @media (max-width: 768px) {
            .topnav {
                flex-direction: column;
                padding: 15px;
                gap: 15px;
            }

            .topnav .nav-links {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 10px;
                width: 100%;
            }

            .topnav .nav-links a {
                margin-left: 0;
                padding: 5px 10px;
            }

            .hero {
                padding: 20px;
                text-align: center;
            }

            .hero h1 {
                font-size: 2rem;
            }

            .user-main {
                margin: 20px auto;
                padding: 0 10px;
            }
        }
    </style>
</head>

<body style="display: block; overflow-y: auto;">
    <div class="topnav">
        <div class="logo">TelecoSmart</div>
        <div class="nav-links">
            <a onclick="navigate('dashboard')">Store & Catalog</a>
            <a onclick="navigate('invoices')">My Invoices</a>
            <a onclick="logout()" style="color: var(--danger-color);">Logout</a>
        </div>
    </div>

    <div class="user-main">
        <div class="hero">
            <h1 id="welcomeTitle">Welcome!</h1>
            <p>Manage your invoices and explore our latest Rateplans and Services.</p>
        </div>

        <div id="app"></div>
    </div>

    <script src="js/user.js"></script>
</body>

</html>
